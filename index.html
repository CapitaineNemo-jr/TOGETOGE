<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ベースキャンプ - 旅のしおり</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">

    <div id="login-screen">
      <div class="brand-logo">TabiShiori</div>
      <div class="brand-subtitle">みんなでつくる、旅の計画アプリ</div>
      
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="input-group">
          <label for="email">メールアドレス</label>
          <input type="email" id="email" required value="demo@example.com">
        </div>
        <div class="input-group">
          <label for="password">パスワード</label>
          <input type="password" id="password" required value="password123">
        </div>
        <button type="submit" class="btn-primary" style="width: 100%;">ログインしてみる</button>
      </form>
    </div>

    <div id="main-screen" class="hidden">
      <header>
        <div class="group-info">
          <div class="group-title-container">
            <div id="group-name" class="group-name" contenteditable="true" onblur="saveGroupName()" onkeydown="checkEnter(event)">旅行のタイトル</div>
            <button type="button" class="btn-edit-icon" onclick="focusGroupName()" aria-label="タイトルを編集">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                <path d="M21.731 2.269a2.625 2.625 0 0 0-3.712 0l-1.157 1.157 3.712 3.712 1.157-1.157a2.625 2.625 0 0 0 0-3.712ZM19.513 8.199l-3.712-3.712-12.15 12.15a5.25 5.25 0 0 0-1.32 2.214l-.8 2.685a.75.75 0 0 0 .933.933l2.685-.8a5.25 5.25 0 0 0 2.214-1.32L19.513 8.2Z" />
              </svg>
            </button>
          </div>
          <div class="member-count">メンバー 6人</div>
        </div>
      </header>

      <div class="main-content">
        
        <div id="tab-shiori" class="tab-content">
          <div class="responsive-layout">
            <div class="layout-left">
              <div class="form-card">
                <div class="form-row">
                  <select id="new-day" style="flex: 1.2;">
                    <option value="1">1日目</option>
                    <option value="2">2日目</option>
                    <option value="3">3日目</option>
                  </select>
                  <input type="time" id="new-time" style="flex: 1.5;" required>
                </div>
                <div class="form-row">
                  <input type="text" id="new-title" placeholder="予定のタイトル" required>
                </div>
                <div class="form-row">
                  <input type="text" id="new-memo" placeholder="メモや詳細（場所など）">
                </div>
                <div class="form-row">
                  <input type="number" id="new-budget" placeholder="予算（数字のみ）">
                </div>
                <button type="button" class="btn-secondary" onclick="addPlan()">予定をタイムラインに追加</button>
              </div>
            </div>
            
            <div class="layout-right">
              <div class="section-title">旅のスケジュール</div>
              <div id="timeline-container"></div>
            </div>
          </div>
        </div>

        <div id="tab-candidates" class="tab-content hidden">
          <div class="responsive-layout">
            <div class="layout-left">
              <div class="form-card">
                <div class="form-row">
                  <input type="text" id="new-candidate-title" placeholder="スポット名 (例: 金閣寺)" required>
                </div>
                <div class="form-row">
                  <input type="text" id="new-candidate-memo" placeholder="やりたいこと・メモ">
                </div>
                <button type="button" class="btn-secondary" style="background-color: #3b82f6;" onclick="addCandidate()">候補リストに追加</button>
              </div>
            </div>
            
            <div class="layout-right">
              <div class="section-title">みんなの行きたい候補（投票順）</div>
              <div id="candidates-container"></div>
            </div>
          </div>
        </div>

        <div id="tab-warikan" class="tab-content hidden">
          <div style="max-width: 500px; margin: 0 auto;">
            <div class="section-title">現在の立て替え状況</div>
            <div class="warikan-card">
              <div class="warikan-row"><span>Aさん ➔ Bさん</span><span style="color: #ef4444; font-weight: bold;">¥1,200 支払う</span></div>
            </div>
          </div>
        </div>

      </div>

      <div class="bottom-nav">
        <div id="nav-shiori" class="nav-item active" onclick="switchTab('shiori')">しおり</div>
        <div id="nav-candidates" class="nav-item" onclick="switchTab('candidates')">行きたい候補</div>
        <div id="nav-warikan" class="nav-item" onclick="switchTab('warikan')">割り勘</div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
